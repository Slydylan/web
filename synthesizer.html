<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Ratio Synthesizer</title><style>body{margin:0;background:#080912;color:#eef1ff;font:16px/1.5 system-ui;padding:28px;max-width:820px}a{color:#82ffd8}.card{background:#121628;border:1px solid #2c3557;border-radius:18px;padding:20px;margin:16px 0}input{width:100%;accent-color:#82ffd8}button{background:#18233d;color:#eef1ff;border:1px solid #2c3557;border-radius:10px;padding:10px 14px}</style></head><body><a href="index.html">← Home</a><h1>Ratio Synthesizer</h1><p>This is an audio renderer for ratios. Hertz values are user-interface choices only, not universal constants.</p><div class="card"><label>audible base tone <span id="baseV"></span></label><input id="base" type="range" min="80" max="440" value="220"><label>ratio numerator <span id="numV"></span></label><input id="num" type="range" min="1" max="13" value="3"><label>ratio denominator <span id="denV"></span></label><input id="den" type="range" min="1" max="13" value="2"><p>output: <b id="out"></b></p><button id="play">play/stop</button></div><script>let ac,osc;$=id=>document.getElementById(id);function upd(){let base=+$('base').value,num=+$('num').value,den=+$('den').value,f=base*num/den;$('baseV').textContent=base;$('numV').textContent=num;$('denV').textContent=den;$('out').textContent=f.toFixed(2)+' Hz';if(osc)osc.frequency.value=f}['base','num','den'].forEach(id=>$(id).oninput=upd);upd();$('play').onclick=()=>{if(osc){osc.stop();osc=null;return}ac=ac||new AudioContext();osc=ac.createOscillator();let gain=ac.createGain();gain.gain.value=.06;osc.connect(gain).connect(ac.destination);upd();osc.start()}</script></body></html>
