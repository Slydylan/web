<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Planck Gravity Simulator</title><style>body{margin:0;background:#070912;color:#eef1ff;font:15px/1.5 system-ui}canvas{display:block;width:100vw;height:100vh}.ui{position:fixed;right:16px;top:16px;background:#121628;border:1px solid #2c3557;border-radius:16px;padding:16px;width:300px}a{color:#82ffd8}input{width:100%;accent-color:#82ffd8}.f{font-family:monospace;background:#050711;padding:8px;border-radius:8px}</style></head><body><canvas id="c"></canvas><div class="ui"><a href="index.html">← Home</a><h2>Planck Gravity</h2><p>Natural units: c=G=1.</p><div class="f">aᵣ=-M/r²<br>v²=M/r<br>rₛ=2M</div><label>M <span id="mv"></span></label><input id="m" type="range" min="1" max="100" value="16"><label>r <span id="rv"></span></label><input id="r" type="range" min="60" max="260" value="170"><button onclick="trail=[]">clear trail</button></div><script>const c=document.getElementById('c'),g=c.getContext('2d');let W,H,D=1,trail=[];function R(){D=devicePixelRatio||1;W=c.width=innerWidth*D;H=c.height=innerHeight*D;g.setTransform(D,0,0,D,0,0)}onresize=R;R();let $=id=>document.getElementById(id),ang=0;function loop(){let M=+$('m').value/10,r=+$('r').value;$('mv').textContent=M.toFixed(1);$('rv').textContent=r;let v=Math.sqrt(M/r);ang+=v*2;let cx=innerWidth/2,cy=innerHeight/2,x=cx+Math.cos(ang)*r,y=cy+Math.sin(ang)*r;trail.push([x,y]);if(trail.length>800)trail.shift();g.fillStyle='rgba(7,9,18,.22)';g.fillRect(0,0,innerWidth,innerHeight);g.fillStyle='#ffd36b';g.beginPath();g.arc(cx,cy,4+2*M,0,Math.PI*2);g.fill();g.strokeStyle='rgba(130,255,216,.5)';g.beginPath();trail.forEach((p,i)=>i?g.lineTo(p[0],p[1]):g.moveTo(p[0],p[1]));g.stroke();g.fillStyle='#82ffd8';g.beginPath();g.arc(x,y,5,0,Math.PI*2);g.fill();requestAnimationFrame(loop)}loop()</script></body></html>
