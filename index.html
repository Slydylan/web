<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Fractal Entrainment Prototype</title>
<style>
  body {
    margin: 0;
    background: #000;
    color: #ddd;
    font-family: sans-serif;
    display: flex;
    flex-direction: row;
    height: 100vh;
    overflow: hidden;
  }
  #controls {
    width: 260px;
    padding: 10px;
    box-sizing: border-box;
    background: #111;
    overflow-y: auto;
    font-size: 12px;
  }
  #controls h2 {
    margin: 6px 0;
    font-size: 14px;
  }
  #controls label {
    display: block;
    margin-top: 6px;
  }
  #controls input[type="number"],
  #controls input[type="range"] {
    width: 100%;
  }
  #canvasContainer {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #000;
  }
  #stimCanvas {
    background: #000;
    max-width: 100%;
    max-height: 100%;
  }
  button {
    margin-top: 6px;
    width: 100%;
  }
</style>
</head>
<body>

<div id="controls">
  <h2>Fractal Entrainment</h2>

  <label>Monitor width (cm)
    <input id="monitorWidth" type="number" min="20" max="100" step="1" value="50">
  </label>

  <label>Viewing distance (cm)
    <input id="viewDist" type="number" min="30" max="150" step="1" value="60">
  </label>

  <label>Refresh rate (Hz)
    <input id="refreshRate" type="number" min="30" max="240" step="1" value="60">
  </label>

  <label>Target center frequency (Hz)
    <input id="fCenter" type="number" min="5" max="80" step="1" value="40">
  </label>

  <label>Target band width (Hz)
    <input id="fWidth" type="number" min="2" max="20" step="1" value="10">
  </label>

  <label>Inner radius fraction
    <input id="innerFrac" type="range" min="0.05" max="0.3" step="0.01" value="0.1">
  </label>

  <label>Outer radius fraction
    <input id="outerFrac" type="range" min="0.2" max="0.8" step="0.01" value="0.4">
  </label>

  <label>Spatial freq (cycles/deg)
    <input id="kCycles" type="number" min="0.2" max="4.0" step="0.1" value="1.0">
  </label>

  <hr>

  <label><input id="enableEnv" type="checkbox" checked> Enable envelope</label>

  <label>Fast depth
    <input id="dFast" type="range" min="0" max="1" step="0.05" value="0.4">
  </label>

  <label>FM ratio (fast/medium)
    <input id="rFM" type="range" min="4" max="16" step="1" value="8">
  </label>

  <label>Medium depth
    <input id="dMed" type="range" min="0" max="0.5" step="0.05" value="0.2">
  </label>

  <label>Slow freq (Hz)
    <input id="fSlow" type="number" min="0.01" max="0.2" step="0.01" value="0.05">
  </label>

  <label>Slow depth
    <input id="dSlow" type="range" min="0" max="0.5" step="0.05" value="0.1">
  </label>

  <label>Max brightness
    <input id="maxBright" type="range" min="0.1" max="1" step="0.05" value="0.5">
  </label>

  <label>Session duration (min)
    <input id="sessMin" type="number" min="1" max="20" step="1" value="5">
  </label>

  <button id="startBtn">Start</button>
  <button id="stopBtn">Stop</button>
</div>

<div id="canvasContainer">
  <canvas id="stimCanvas"></canvas>
</div>

<script>
// Basic deterministic "noise" for fractal-like texture (fast & simple)
function hash2d(x, y) {
  var s = Math.sin(x * 127.1 + y * 311.7) * 43758.5453123;
  return s - Math.floor(s);
}

// Build grayscale tile
function makeTile(size) {
  var off = document.createElement('canvas');
  off.width = size;
  off.height = size;
  var ctx = off.getContext('2d');
  var img = ctx.createImageData(size, size);
  for (var y = 0; y < size; y++) {
    for (var x = 0; x < size; x++) {
      var v = 0;
      // 3-octave fake fractal noise
      var f = 1.0;
      var amp = 1.0;
      var norm = 0.0;
      for (var o = 0; o < 3; o++) {
        v += amp * hash2d(x * f, y * f);
        norm += amp;
        f *= 2.0;
        amp *= 0.5;
      }
      v /= norm;
      var c = Math.floor(v * 255);
      var idx = (y * size + x) * 4;
      img.data[idx] = c;
      img.data[idx+1] = c;
      img.data[idx+2] = c;
      img.data[idx+3] = 255;
    }
  }
  ctx.putImageData(img, 0, 0);
  return off;
}

(function() {
  var canvas = document.getElementById('stimCanvas');
  var ctx = canvas.getContext('2d');

  var running = false;
  var startTime = 0;
  var config = null;
  var state = null;
  var tileCanvas = null;

  function readConfig() {
    var screenWidthPx = window.innerWidth - 260; // approx canvas width region
    var screenHeightPx = window.innerHeight;
    canvas.width = screenWidthPx;
    canvas.height = screenHeightPx;

    var monitorWidthCm = parseFloat(document.getElementById('monitorWidth').value) || 50;
    var viewDistCm = parseFloat(document.getElementById('viewDist').value) || 60;
    var refreshRate = parseFloat(document.getElementById('refreshRate').value) || 60;

    var fCenter = parseFloat(document.getElementById('fCenter').value) || 40;
    var fWidth  = parseFloat(document.getElementById('fWidth').value) || 10;
    var innerFrac = parseFloat(document.getElementById('innerFrac').value);
    var outerFrac = parseFloat(document.getElementById('outerFrac').value);
    if (outerFrac <= innerFrac) outerFrac = innerFrac + 0.05;
    var kCycles = parseFloat(document.getElementById('kCycles').value) || 1.0;

    var enableEnv = document.getElementById('enableEnv').checked;
    var dFast = parseFloat(document.getElementById('dFast').value);
    var rFM   = parseFloat(document.getElementById('rFM').value);
    var dMed  = parseFloat(document.getElementById('dMed').value);
    var fSlow = parseFloat(document.getElementById('fSlow').value);
    var dSlow = parseFloat(document.getElementById('dSlow').value);
    var maxBright = parseFloat(document.getElementById('maxBright').value);
    var sessMin   = parseFloat(document.getElementById('sessMin').value);

    // FOV
    var fovRad = 2 * Math.atan((monitorWidthCm / 2) / viewDistCm);
    var fovDeg = fovRad * 180 / Math.PI;
    var pixelsPerDeg = screenWidthPx / fovDeg;

    var RdegInner = (fovDeg / 2) * innerFrac;
    var RdegOuter = (fovDeg / 2) * outerFrac;
    var RpxInner = RdegInner * pixelsPerDeg;
    var RpxOuter = RdegOuter * pixelsPerDeg;
    var RdegMid = (RdegInner + RdegOuter) / 2;

    // tile size from spatial freq
    var tileVisualWidthDeg = 1 / kCycles;
    var tileWidthPxRaw = tileVisualWidthDeg * pixelsPerDeg;
    var tileWidthPx = Math.max(100, Math.min(400, Math.round(tileWidthPxRaw)));

    // choose f_target near center and aligned with refresh
    var fMin = fCenter - fWidth / 2;
    var fMax = fCenter + fWidth / 2;
    var candidates = [];
    for (var n = 2; n <= 20; n++) {
      var fN = refreshRate / n;
      if (fN >= fMin && fN <= fMax) candidates.push(fN);
    }
    var fTarget = fCenter;
    if (candidates.length > 0) {
      var best = candidates[0];
      var bestDiff = Math.abs(best - fCenter);
      for (var i = 1; i < candidates.length; i++) {
        var d = Math.abs(candidates[i] - fCenter);
        if (d < bestDiff) { bestDiff = d; best = candidates[i]; }
      }
      fTarget = best;
    }

    // rotation: f ≈ omega * k
    var omegaDegPerSec = fTarget / kCycles;
    var degPerFrame = omegaDegPerSec / refreshRate;

    // envelope frequencies
    var fFast = fTarget;
    var fMed = fFast / rFM;

    return {
      screenWidthPx: screenWidthPx,
      screenHeightPx: screenHeightPx,
      monitorWidthCm: monitorWidthCm,
      viewDistCm: viewDistCm,
      refreshRate: refreshRate,
      pixelsPerDeg: pixelsPerDeg,
      fovDeg: fovDeg,
      RdegInner: RdegInner,
      RdegOuter: RdegOuter,
      RpxInner: RpxInner,
      RpxOuter: RpxOuter,
      RdegMid: RdegMid,
      kCycles: kCycles,
      tileWidthPx: tileWidthPx,
      fTarget: fTarget,
      omegaDegPerSec: omegaDegPerSec,
      degPerFrame: degPerFrame,
      enableEnv: enableEnv,
      dFast: dFast,
      fFast: fFast,
      fMed: fMed,
      dMed: dMed,
      fSlow: fSlow,
      dSlow: dSlow,
      maxBright: maxBright,
      baseContrast: maxBright,
      sessMin: sessMin
    };
  }

  function initState(cfg) {
    return {
      angleDeg: 0,
      scale: 1.0,
      t0: performance.now() / 1000
    };
  }

  function computeEnvelope(cfg, t) {
    if (!cfg.enableEnv) return cfg.baseContrast;

    var E = 1.0;
    var EF = 1 + cfg.dFast * Math.sin(2 * Math.PI * cfg.fFast * t);
    E *= EF;
    var EM = 1 + cfg.dMed * Math.sin(2 * Math.PI * cfg.fMed * t);
    E *= EM;
    var ES = 1 + cfg.dSlow * Math.sin(2 * Math.PI * cfg.fSlow * t);
    E *= ES;

    // simple normalization/clamp
    var maxDepth = 1 + (cfg.dFast + cfg.dMed + cfg.dSlow);
    var norm = 1; // you can tweak if needed
    var val = cfg.baseContrast * (E / norm);
    if (val < 0) val = 0;
    if (val > cfg.maxBright * maxDepth) val = cfg.maxBright * maxDepth;
    return val;
  }

  function renderFrame(cfg, st) {
    var w = cfg.screenWidthPx;
    var h = cfg.screenHeightPx;
    ctx.clearRect(0, 0, w, h);

    var cx = w / 2;
    var cy = h / 2;

    // background fill (black)
    ctx.fillStyle = "#000";
    ctx.fillRect(0, 0, w, h);

    if (!tileCanvas) return;

    ctx.save();
    ctx.translate(cx, cy);
    ctx.rotate(st.angleDeg * Math.PI / 180);
    ctx.scale(st.scale, st.scale);

    // Tile across canvas
    var tw = cfg.tileWidthPx;
    var th = cfg.tileWidthPx;
    var cols = Math.ceil(w / tw) + 2;
    var rows = Math.ceil(h / th) + 2;
    var startX = -cols * tw / 2;
    var startY = -rows * th / 2;

    // envelope factor
    var t = (performance.now() / 1000) - st.t0;
    var env = computeEnvelope(cfg, t);

    ctx.globalAlpha = Math.min(1.0, env);

    for (var iy = 0; iy < rows; iy++) {
      for (var ix = 0; ix < cols; ix++) {
        var x = startX + ix * tw;
        var y = startY + iy * th;
        ctx.drawImage(tileCanvas, x, y, tw, th);
      }
    }

    ctx.restore();

    // annulus mask: central blank and outer fade
    ctx.save();
    ctx.globalCompositeOperation = "destination-out";
    ctx.beginPath();
    ctx.arc(cx, cy, cfg.RpxInner, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();

    // optional soft outer edge (fade)
    var grd = ctx.createRadialGradient(cx, cy, cfg.RpxOuter * 0.9, cx, cy, cfg.RpxOuter * 1.1);
    grd.addColorStop(0, "rgba(0,0,0,0)");
    grd.addColorStop(1, "rgba(0,0,0,1)");
    ctx.fillStyle = grd;
    ctx.beginPath();
    ctx.arc(cx, cy, cfg.RpxOuter * 1.1, 0, Math.PI * 2);
    ctx.fill();

    // central fixation marker
    ctx.strokeStyle = "rgba(255,255,255,0.4)";
    ctx.beginPath();
    ctx.arc(cx, cy, cfg.RpxInner * 0.15, 0, Math.PI * 2);
    ctx.stroke();
  }

  function loop() {
    if (!running || !config || !state) return;

    var now = performance.now() / 1000;
    var dt = now - state.lastTime;
    state.lastTime = now;

    state.angleDeg += config.degPerFrame;

    renderFrame(config, state);

    var elapsedMin = (now - state.t0) / 60;
    if (elapsedMin >= config.sessMin) {
      running = false;
      return;
    }
    requestAnimationFrame(loop);
  }

  document.getElementById('startBtn').onclick = function() {
    config = readConfig();
    tileCanvas = makeTile(config.tileWidthPx);
    state = initState(config);
    state.lastTime = performance.now() / 1000;
    running = true;
    requestAnimationFrame(loop);
  };

  document.getElementById('stopBtn').onclick = function() {
    running = false;
  };

  window.addEventListener('resize', function() {
    if (running) {
      config = readConfig();
    } else {
      var cfgTmp = readConfig();
    }
  });
})();
</script>

</body>
</html>
