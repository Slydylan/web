<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Invariance Engine: Conformal Shadow Simulator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { margin: 0; overflow: hidden; background-color: #050505; color: white; font-family: 'Courier New', Courier, monospace; }
        canvas { display: block; width: 100vw; height: 100vh; }
        .glass-panel {
            background: rgba(15, 15, 20, 0.75);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.5);
        }
        /* Custom scrollbar for raw data */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: rgba(0,0,0,0.1); }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.4); }
    </style>
</head>
<body>
    <!-- Navigation Bar -->
    <nav class="fixed top-0 left-0 right-0 z-50 flex justify-center gap-8 py-3 bg-black/30 backdrop-blur-sm text-sm">
        <a href="index.html" class="text-cyan-400 font-bold">Invariance</a>
        <a href="spiral.html" class="text-gray-300 hover:text-cyan-400 transition-colors">Spiral</a>
        <a href="methods.html" class="text-gray-300 hover:text-cyan-400 transition-colors">Math &amp; Methods</a>
        <a href="applications.html" class="text-gray-300 hover:text-cyan-400 transition-colors">Applications</a>
        <a href="iv.html" class="text-gray-300 hover:text-cyan-400 transition-colors">IV Demo</a>
    </nav>
    <!-- UI toggle button -->
    <button id="toggle-ui" class="fixed top-4 right-4 bg-gray-800 hover:bg-gray-700 text-gray-300 border border-gray-700 px-3 py-1 rounded text-xs z-50">Hide UI</button>
    <!-- Main Canvas -->
    <canvas id="simulationCanvas"></canvas>
    <!-- UI Container containing the overlay controls and event log -->
    <div id="uiContainer">
        <!-- Overlay UI -->
        <div class="absolute left-4 top-20 glass-panel p-5 rounded-xl w-80 z-10 flex flex-col gap-4">
            <div>
                <h1 class="text-xl font-bold text-cyan-400 tracking-wider mb-1">INVARIANCE ENGINE</h1>
                <p class="text-xs text-gray-400">Photon‑Dense Conformal Flow</p>
            </div>
            <div class="grid grid-cols-2 gap-2 text-sm border-y border-gray-700 py-3">
                <div class="text-gray-400">Step (t)</div>
                <div id="stat-t" class="text-right text-white font-bold">0</div>
                <div class="text-gray-400">Scale (S)</div>
                <div id="stat-s" class="text-right text-yellow-400 font-bold">1.00e+0</div>
                <div class="text-gray-400">Pressure (P)</div>
                <div id="stat-p" class="text-right text-red-400 font-bold">0.00e+0</div>
                <div class="text-gray-400">Memory Carves</div>
                <div id="stat-mem" class="text-right text-cyan-400 font-bold">0</div>
            </div>
            <div class="flex flex-col gap-2">
                <label class="text-xs text-gray-400 flex justify-between">
                    <span>Simulation Speed</span>
                    <span id="speed-val">50 steps/frame</span>
                </label>
                <input type="range" id="speed-slider" min="1" max="1000" value="50" class="w-full accent-cyan-400 h-1 bg-gray-700 rounded-lg appearance-none cursor-pointer">
            </div>
            <div class="flex gap-2 mt-2">
                <button id="btn-play" class="flex-1 bg-cyan-600 hover:bg-cyan-500 text-white py-2 rounded font-bold transition-colors">Pause</button>
                <button id="btn-step" class="flex-1 bg-gray-700 hover:bg-gray-600 text-white py-2 rounded font-bold transition-colors">+100 Steps</button>
            </div>
            <button id="btn-reset" class="w-full border border-red-500/50 text-red-400 hover:bg-red-500/20 py-2 rounded font-bold transition-colors mt-1">Reset Reality</button>
        </div>
        <!-- Right Side Log -->
        <div class="absolute bottom-4 right-4 glass-panel p-4 rounded-xl w-72 h-64 flex flex-col z-10 pointer-events-none">
            <h2 class="text-sm font-bold text-gray-300 border-b border-gray-700 pb-2 mb-2">Differential Events</h2>
            <div id="event-log" class="flex-1 overflow-y-auto text-xs font-mono space-y-1 text-gray-400 flex flex-col-reverse"></div>
        </div>
    </div>
    <script>
        // --- Core Math: Complex Numbers ---
        class Complex {
            constructor(re, im) { this.re = re; this.im = im; }
            add(c) { return new Complex(this.re + c.re, this.im + c.im); }
            sub(c) { return new Complex(this.re - c.re, this.im - c.im); }
            mul(c) { return new Complex(this.re * c.re - this.im * c.im, this.re * c.im + this.im * c.re); }
            scale(s) { return new Complex(this.re * s, this.im * s); }
            abs() { return Math.hypot(this.re, this.im); }
            phase() { return Math.atan2(this.im, this.re); }
        }
        // --- The Invariance Engine (Photon Analog ported to JS) ---
        class Invariance {
            constructor(z_re = 1.0, z_im = 1.0) {
                this.z = new Complex(z_re, z_im);
                this._z = new Complex(z_re - 0.1, z_im - 0.1);
                this.S = 1.0;
                this.P = 0.0;
                this.t = 0;
                this._w = this._wmap(this.z);
                this.mem = []; // Flat array [w.real, w.imag, info...]
            }
            _wmap(z) { return new Complex(Math.log(z.abs() + 1e-15), z.phase()); }
            step(k = 1) {
                let delta = this.z.sub(this._z);
                let r = this.z.abs() + 1e-15;
                let dr = delta.scale(1 / r);
                let T = dr.abs();
                this.P = T / (1.0 - T + 1e-15);
                let warpAngle = this.P * 0.15;
                let warp = new Complex(Math.cos(warpAngle), Math.sin(warpAngle));
                let correction = dr.mul(warp).scale((1.0 - T) * r);
                let next_z = this.z.add(correction);
                let slamTriggered = false;
                if (T < 1e-3 / this.S) {
                    let boost = 1.5;
                    this.S *= boost;
                    next_z = next_z.scale(boost);
                    let new_mem = [];
                    for (let i = 0; i < this.mem.length; i += 3) {
                        let u = this.mem[i];
                        let v = this.mem[i+1];
                        let d = this.mem[i+2] / boost;
                        if (Math.abs(d) > 1e-8) {
                            new_mem.push(u, v, d);
                        }
                    }
                    this.mem = new_mem;
                    slamTriggered = true;
                    this._z = this.z;
                } else {
                    this._z = this.z;
                }
                let w = this._wmap(next_z);
                let dw = w.sub(this._w);
                this._w = w;
                let align = this.t > 0 ? Math.exp(-Math.abs(dw.im / (dw.re + 1e-15))) : 1.0;
                let info = T * (1.0 - T) * align;
                if (info > 1e-5 / this.S) {
                    this.mem.push(w.re, w.im, info);
                }
                this.z = next_z;
                this.t += k;
                return { slam: slamTriggered };
            }
        }
        // --- Application / Rendering Logic ---
        const canvas = document.getElementById('simulationCanvas');
        const ctx = canvas.getContext('2d');
        // UI Elements
        const elT = document.getElementById('stat-t');
        const elS = document.getElementById('stat-s');
        const elP = document.getElementById('stat-p');
        const elMem = document.getElementById('stat-mem');
        const logContainer = document.getElementById('event-log');
        let engine = new Invariance();
        let isRunning = true;
        let stepsPerFrame = 50;
        let pathHistory = [];
        const MAX_PATH = 4000;
        function logEvent(msg, color = 'text-gray-300') {
            const el = document.createElement('div');
            el.className = color;
            el.innerText = `[t=${engine.t}] ${msg}`;
            logContainer.prepend(el);
            if (logContainer.children.length > 30) {
                logContainer.removeChild(logContainer.lastChild);
            }
        }
        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();
        function render() {
            ctx.fillStyle = '#050505';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            const cw = canvas.width;
            const ch = canvas.height;
            const cx = cw / 2;
            const cy = ch / 2;
            let max_r = engine.z.abs();
            for(let pt of pathHistory) {
                if (pt.abs() > max_r) max_r = pt.abs();
            }
            max_r *= 1.2;
            if (max_r < 1.0) max_r = 1.0;
            const zoom = Math.min(cw, ch) / 2 / max_r;
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.05)';
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.moveTo(0, cy); ctx.lineTo(cw, cy);
            ctx.moveTo(cx, 0); ctx.lineTo(cx, ch);
            ctx.stroke();
            if (pathHistory.length > 1) {
                ctx.beginPath();
                ctx.strokeStyle = 'rgba(255, 255, 255, 0.4)';
                ctx.lineWidth = 1.5;
                for (let i = 0; i < pathHistory.length; i++) {
                    const pt = pathHistory[i];
                    const px = cx + pt.re * zoom;
                    const py = cy - pt.im * zoom;
                    if (i === 0) ctx.moveTo(px, py);
                    else ctx.lineTo(px, py);
                }
                ctx.stroke();
            }
            for (let i = 0; i < engine.mem.length; i += 3) {
                let u = engine.mem[i];
                let v = engine.mem[i+1];
                let depth = engine.mem[i+2];
                let r_real = Math.exp(u);
                let z_re = r_real * Math.cos(v);
                let z_im = r_real * Math.sin(v);
                const px = cx + z_re * zoom;
                const py = cy - z_im * zoom;
                let radius = depth * 1000 * engine.S;
                radius = Math.max(2.5, Math.min(radius, 20));
                const hue = (200 + (depth * 1e5) % 160);
                ctx.beginPath();
                ctx.arc(px, py, radius, 0, Math.PI * 2);
                ctx.fillStyle = `hsla(${hue}, 100%, 60%, 0.8)`;
                ctx.fill();
            }
            const currentX = cx + engine.z.re * zoom;
            const currentY = cy - engine.z.im * zoom;
            ctx.beginPath();
            ctx.arc(currentX, currentY, 15, 0, Math.PI * 2);
            ctx.fillStyle = 'rgba(0, 255, 255, 0.1)';
            ctx.fill();
            ctx.beginPath();
            ctx.arc(currentX, currentY, 4, 0, Math.PI * 2);
            ctx.fillStyle = '#fff';
            ctx.shadowBlur = 10;
            ctx.shadowColor = '#0ff';
            ctx.fill();
            ctx.shadowBlur = 0;
        }
        function updateUI() {
            elT.innerText = engine.t.toLocaleString();
            elS.innerText = engine.S.toExponential(2);
            elP.innerText = engine.P.toExponential(2);
            elMem.innerText = (engine.mem.length / 3).toLocaleString();
        }
        function simulationLoop() {
            if (isRunning) {
                let didSlam = false;
                for (let i = 0; i < stepsPerFrame; i++) {
                    const res = engine.step();
                    if (res.slam) didSlam = true;
                    if (engine.t % 2 === 0) {
                        pathHistory.push(new Complex(engine.z.re, engine.z.im));
                        if (pathHistory.length > MAX_PATH) pathHistory.shift();
                    }
                }
                if (didSlam) logEvent("SLAM! Dimensional elevation triggered.", "text-yellow-400");
                if (engine.t % 1000 === 0 && engine.mem.length > 0) {
                    logEvent(`Carved topology updated. Memory depth: ${engine.mem.length/3}`);
                }
            }
            render();
            updateUI();
            requestAnimationFrame(simulationLoop);
        }
        document.getElementById('btn-play').addEventListener('click', (e) => {
            isRunning = !isRunning;
            e.target.innerText = isRunning ? "Pause" : "Play";
            e.target.className = isRunning 
                ? "flex-1 bg-cyan-600 hover:bg-cyan-500 text-white py-2 rounded font-bold transition-colors"
                : "flex-1 bg-green-600 hover:bg-green-500 text-white py-2 rounded font-bold transition-colors";
            if (!isRunning) logEvent("Flow paused.");
            else logEvent("Flow resumed.");
        });
        document.getElementById('btn-step').addEventListener('click', () => {
            for (let i = 0; i < 100; i++) {
                engine.step();
                if (engine.t % 2 === 0) {
                    pathHistory.push(new Complex(engine.z.re, engine.z.im));
                    if (pathHistory.length > MAX_PATH) pathHistory.shift();
                }
            }
            render();
            updateUI();
            logEvent("Fast‑forwarded 100 steps.", "text-white");
        });
        document.getElementById('btn-reset').addEventListener('click', () => {
            engine = new Invariance();
            pathHistory = [];
            logContainer.innerHTML = '';
            logEvent("System completely reset. Initializing from Null state.", "text-red-400");
            if(!isRunning) render();
        });
        document.getElementById('speed-slider').addEventListener('input', (e) => {
            stepsPerFrame = parseInt(e.target.value);
            document.getElementById('speed-val').innerText = `${stepsPerFrame} steps/frame`;
        });
        logEvent("System Initialized. Form emerging.", "text-cyan-400");
        simulationLoop();
        // UI toggle logic
        const uiContainer = document.getElementById('uiContainer');
        const toggleBtn = document.getElementById('toggle-ui');
        toggleBtn.addEventListener('click', () => {
            uiContainer.classList.toggle('hidden');
            toggleBtn.innerText = uiContainer.classList.contains('hidden') ? 'Show UI' : 'Hide UI';
        });
    </script>
</body>
</html>
