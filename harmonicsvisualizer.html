<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Ratio Phase Visualizer</title><style>body{margin:0;background:#070912;color:#eef1ff;font:15px/1.5 system-ui}canvas{display:block;width:100vw;height:100vh}.ui{position:fixed;right:16px;top:16px;background:#121628;border:1px solid #2c3557;border-radius:16px;padding:16px;width:280px}a{color:#82ffd8}input{width:100%;accent-color:#82ffd8}</style></head><body><canvas id="c"></canvas><div class="ui"><a href="index.html">← Home</a><h2>Ratio Phase Visualizer</h2><p>Dimensionless phase ratios. No universal hertz anchor.</p><label>ratio A <span id="aV"></span></label><input id="a" type="range" min="1" max="13" value="3"><label>ratio B <span id="bV"></span></label><input id="b" type="range" min="1" max="13" value="5"><label>memory <span id="mV"></span></label><input id="m" type="range" min="1" max="100" value="65"></div><script>const c=document.getElementById('c'),x=c.getContext('2d');let W,H,D=1,t=0;function R(){D=devicePixelRatio||1;W=c.width=innerWidth*D;H=c.height=innerHeight*D;x.setTransform(D,0,0,D,0,0)}onresize=R;R();let $=id=>document.getElementById(id);function loop(){t+=.01;let a=+$('a').value,b=+$('b').value,m=+$('m').value/100;$('aV').textContent=a;$('bV').textContent=b;$('mV').textContent=m.toFixed(2);x.fillStyle='rgba(7,9,18,.16)';x.fillRect(0,0,innerWidth,innerHeight);x.save();x.translate(innerWidth/2,innerHeight/2);x.strokeStyle='rgba(130,255,216,.55)';x.beginPath();for(let i=0;i<900;i++){let q=i/900*Math.PI*2;let r=Math.min(innerWidth,innerHeight)*.28*(1+.25*Math.sin(a*q+t)+.2*Math.cos(b*q-t*m));let px=Math.cos(q)*r,py=Math.sin(q)*r;i?x.lineTo(px,py):x.moveTo(px,py)}x.closePath();x.stroke();x.restore();requestAnimationFrame(loop)}loop()</script></body></html>
