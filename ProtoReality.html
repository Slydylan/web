<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Planck Origin Map Visualizer</title><style>
:root{--bg:#050711;--panel:#11172a;--text:#eef1ff;--muted:#94a0c2;--accent:#82ffd8;--violet:#b895ff;--border:#2d375c}*{box-sizing:border-box}body{margin:0;background:#050711;color:var(--text);font:14px/1.4 system-ui,-apple-system,Segoe UI,sans-serif;overflow:hidden}.wrap{display:grid;grid-template-columns:1fr 320px;height:100vh}canvas{width:100%;height:100%;display:block;background:radial-gradient(circle at center,#141936,#050711 70%)}aside{background:rgba(17,23,42,.96);border-left:1px solid var(--border);padding:18px;overflow:auto}h1{font-size:1.3rem;margin:0 0 6px;color:var(--accent)}p{color:var(--muted)}.row{margin:14px 0}.row label{display:flex;justify-content:space-between;color:#cdd5ef;margin-bottom:5px}input,button,textarea{width:100%}input[type=range]{accent-color:var(--accent)}button{background:#18233d;color:var(--text);border:1px solid var(--border);border-radius:10px;padding:10px;margin:4px 0;cursor:pointer}button.active{border-color:var(--accent);color:var(--accent)}textarea{height:110px;background:#060915;color:var(--text);border:1px solid var(--border);border-radius:10px;padding:8px}.stat{display:grid;grid-template-columns:1fr auto;gap:8px;padding:8px 0;border-bottom:1px solid var(--border)}.formula{font-family:ui-monospace,Menlo,Consolas,monospace;background:#060915;border:1px solid var(--border);border-radius:10px;padding:10px;color:#dfe6ff}.home{position:fixed;left:14px;top:12px;color:var(--accent);z-index:3}</style></head><body><a class="home" href="index.html">← Home</a><div class="wrap"><canvas id="c"></canvas><aside>
<h1>Planck Origin Map</h1><p>Dimensionless browser toy. Core convention: c=G=ħ=kB=1. Frequency is phase advance per tick.</p>
<div class="formula">θ ← wrap(θ + ωΔτ)<br>A_i = n_i/15<br>score = coherence × novelty</div>
<div class="row"><label>phase tick ω <span id="omegaV"></span></label><input id="omega" type="range" min="0" max="200" value="73"></div>
<div class="row"><label>commit threshold <span id="thV"></span></label><input id="th" type="range" min="0" max="100" value="58"></div>
<div class="row"><label>novelty drive <span id="novV"></span></label><input id="nov" type="range" min="0" max="100" value="42"></div>
<div class="row"><button id="run" class="active">pause</button><button id="step">step</button><button id="reset">reset</button><button id="save">export save</button><button id="load">import save</button></div>
<div class="stat"><span>tick</span><b id="tick">0</b></div><div class="stat"><span>particles</span><b id="count">0</b></div><div class="stat"><span>commits</span><b id="commits">0</b></div><div class="stat"><span>coherence</span><b id="coh">0</b></div>
<div class="row"><textarea id="blob" placeholder="save JSON appears here; paste then import"></textarea></div>
</aside></div><script>
const canvas=document.getElementById('c'),ctx=canvas.getContext('2d');let W=0,H=0,DPR=1;function resize(){DPR=devicePixelRatio||1;W=canvas.clientWidth;H=canvas.clientHeight;canvas.width=W*DPR;canvas.height=H*DPR;ctx.setTransform(DPR,0,0,DPR,0,0)}addEventListener('resize',resize);resize();
const TAU=Math.PI*2,PHI=(1+Math.sqrt(5))/2;let state={running:true,tick:0,commits:[],nodes:[]};function seed(){state.nodes=[];for(let i=0;i<96;i++){state.nodes.push({r:20+Math.random()*Math.min(W,H)*.42,a:Math.random()*TAU,p:Math.random()*TAU,v:(Math.random()-.5)*.012,s:Math.random()})}}seed();
const $=id=>document.getElementById(id);function vals(){let omega=$('omega').value/100,th=$('th').value/100,nov=$('nov').value/100;$('omegaV').textContent=omega.toFixed(2);$('thV').textContent=th.toFixed(2);$('novV').textContent=nov.toFixed(2);return{omega,th,nov}}
function wrap(x){return Math.atan2(Math.sin(x),Math.cos(x))}function update(){const {omega,th,nov}=vals();state.tick++;for(const n of state.nodes){n.p=wrap(n.p+omega*.08+n.v);n.a+=n.v+Math.sin(n.p)*.002;let coherence=(1+Math.cos(n.p-n.a))/2;let novelty=Math.abs(Math.sin(n.a*PHI+state.tick*.01));let score=coherence*(1-nov)+novelty*nov;if(score>th&&Math.random()<.025){state.commits.push({tick:state.tick,r:n.r,a:n.a,p:n.p,score:+score.toFixed(4)});if(state.commits.length>240)state.commits.shift()}}}
function draw(){ctx.clearRect(0,0,W,H);let cx=W/2,cy=H/2;ctx.save();ctx.translate(cx,cy);ctx.globalCompositeOperation='lighter';for(const c of state.commits){let x=Math.cos(c.a)*c.r,y=Math.sin(c.a)*c.r;ctx.globalAlpha=.08+.3*c.score;ctx.strokeStyle='rgba(130,255,216,.7)';ctx.beginPath();ctx.arc(x,y,2+8*c.score,0,TAU);ctx.stroke()}for(const n of state.nodes){let x=Math.cos(n.a)*n.r,y=Math.sin(n.a)*n.r;let hue=170+80*Math.sin(n.p);ctx.globalAlpha=.65;ctx.fillStyle=`hsl(${hue},80%,65%)`;ctx.beginPath();ctx.arc(x,y,1.5+3*n.s,0,TAU);ctx.fill();ctx.globalAlpha=.12;ctx.strokeStyle=`hsl(${hue},80%,65%)`;ctx.beginPath();ctx.moveTo(0,0);ctx.lineTo(x,y);ctx.stroke()}ctx.restore();let coh=state.nodes.reduce((a,n)=>a+(1+Math.cos(n.p-n.a))/2,0)/state.nodes.length;$('tick').textContent=state.tick;$('count').textContent=state.nodes.length;$('commits').textContent=state.commits.length;$('coh').textContent=coh.toFixed(3)}
function loop(){if(state.running)update();draw();requestAnimationFrame(loop)}loop();$('run').onclick=()=>{state.running=!state.running;$('run').textContent=state.running?'pause':'run';$('run').classList.toggle('active',state.running)};$('step').onclick=()=>{update();draw()};$('reset').onclick=()=>{state={running:false,tick:0,commits:[],nodes:[]};seed();$('run').textContent='run';$('run').classList.remove('active')};$('save').onclick=()=>{$('blob').value=JSON.stringify(state)};$('load').onclick=()=>{try{let s=JSON.parse($('blob').value);if(s&&Array.isArray(s.nodes)){state=s;draw()}}catch(e){alert('Invalid save JSON')}};
</script></body></html>
