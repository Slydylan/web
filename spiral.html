<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Genesis Spiral Visualizer</title>
  <!-- Use Tailwind for nav styling; fallback styles for the rest of the page -->
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    /* Preserve the visual aesthetic of the original genesis spiral */
    body { margin: 0; font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #0b0d12; color: #f5f7fb; }
    main { display: grid; grid-template-columns: 1fr 360px; min-height: 100vh; }
    canvas { width: 100%; height: 100vh; display: block; background: radial-gradient(circle at center, #151a24, #05070a 70%); }
    aside { padding: 20px; border-left: 1px solid rgba(255,255,255,0.12); background: rgba(255,255,255,0.035); overflow: auto; }
    h1 { margin: 0 0 8px; font-size: 22px; }
    label { display: block; margin: 18px 0 6px; font-size: 13px; color: #b8c0d4; }
    input { width: 100%; }
    .stat { padding: 10px 0; border-bottom: 1px solid rgba(255,255,255,0.1); }
    .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace; word-break: break-all; color: #d9e3ff; }
    button { width: 100%; margin-top: 14px; padding: 10px 12px; border: 0; border-radius: 10px; background: #d9e3ff; color: #080b10; font-weight: 700; cursor: pointer; }
  </style>
</head>
<body>
  <!-- Navigation bar -->
  <nav class="fixed top-0 left-0 right-0 z-50 flex justify-center gap-8 py-3 bg-black/30 backdrop-blur-sm text-sm">
    <a href="index.html" class="text-gray-300 hover:text-cyan-400 transition-colors">Invariance</a>
    <a href="spiral.html" class="text-cyan-400 font-bold">Spiral</a>
    <a href="methods.html" class="text-gray-300 hover:text-cyan-400 transition-colors">Math &amp; Methods</a>
    <a href="applications.html" class="text-gray-300 hover:text-cyan-400 transition-colors">Applications</a>
    <a href="iv.html" class="text-gray-300 hover:text-cyan-400 transition-colors">IV Demo</a>
  </nav>
  <!-- UI toggle button -->
  <button id="toggle-ui" class="fixed top-4 right-4 bg-gray-800 hover:bg-gray-700 text-gray-300 border border-gray-700 px-3 py-1 rounded text-xs z-50">Hide UI</button>
  <main class="pt-16">
    <canvas id="view"></canvas>
    <div id="uiContainer">
      <aside>
        <h1>Genesis Spiral</h1>
        <p>Golden‑step phase recursion: <code>phase = phase + φ mod τ</code>. Radius = iteration.</p>

        <label for="iterations">Iterations</label>
        <input id="iterations" type="range" min="64" max="2000" value="1000" step="1" />
        <div class="stat">Iterations: <span id="iterValue">1000</span></div>

        <label for="probe">Probe time slice</label>
        <input id="probe" type="range" min="0" max="1000" value="1000" step="1" />
        <div class="stat">Probe: <span id="probeValue">1000</span></div>

        <div class="stat">Phase: <span id="phase" class="mono"></span></div>
        <div class="stat">Energy: <span id="energy" class="mono"></span></div>
        <div class="stat">Coherence: <span id="coherence" class="mono"></span></div>
        <div class="stat">k‑signature: <span id="ksig" class="mono"></span></div>
        <div class="stat">Hex prefix: <span id="hex" class="mono"></span></div>
        <button id="animate">Toggle animation</button>
      </aside>
    </div>
  </main>
  <script>
    const TAU = Math.PI * 2;
    const PHI = (1 + Math.sqrt(5)) / 2;
    const canvas = document.getElementById('view');
    const ctx = canvas.getContext('2d');
    const iterationsInput = document.getElementById('iterations');
    const probeInput = document.getElementById('probe');
    const fields = {
      iterValue: document.getElementById('iterValue'),
      probeValue: document.getElementById('probeValue'),
      phase: document.getElementById('phase'),
      energy: document.getElementById('energy'),
      coherence: document.getElementById('coherence'),
      ksig: document.getElementById('ksig'),
      hex: document.getElementById('hex')
    };
    let animating = false;
    function pseudoHex(iteration, phase) {
      // Browser‑safe visual proxy for the Python address rule; not cryptographic.
      let x = Math.floor((iteration * PHI + phase / TAU) * 1e9) >>> 0;
      let out = '';
      for (let i = 0; i < 16; i++) {
        x ^= x << 13; x ^= x >>> 17; x ^= x << 5;
        out += (x >>> 0).toString(16).padStart(8, '0');
      }
      return out.slice(0, 128);
    }
    function sample(iteration) {
      const prevPhase = ((Math.max(iteration - 1, 0) * PHI) % TAU);
      const phase = (iteration * PHI) % TAU;
      const energy = Math.abs(Math.sin(phase) - Math.sin(prevPhase));
      const coherence = 1 / (1 + 0.01 * iteration);
      const hex = pseudoHex(iteration, phase);
      const ksig = hex.slice(0, 4).split('').map(c => parseInt(c, 16));
      return { iteration, phase, energy, coherence, hex, ksig };
    }
    function resize() {
      canvas.width = Math.floor(canvas.clientWidth * devicePixelRatio);
      canvas.height = Math.floor(canvas.clientHeight * devicePixelRatio);
    }
    function draw() {
      resize();
      const iterations = Number(iterationsInput.value);
      const probe = Math.min(Number(probeInput.value), iterations);
      probeInput.max = iterations;
      fields.iterValue.textContent = iterations;
      fields.probeValue.textContent = probe;
      const w = canvas.width, h = canvas.height;
      const cx = w / 2, cy = h / 2;
      const maxR = Math.min(w, h) * 0.46;
      ctx.clearRect(0, 0, w, h);
      // Draw spiral path
      ctx.lineWidth = Math.max(1, devicePixelRatio);
      ctx.beginPath();
      for (let i = 1; i <= iterations; i++) {
        const phase = (i * PHI) % TAU;
        const r = (i / iterations) * maxR;
        const x = cx + Math.cos(phase) * r;
        const y = cy + Math.sin(phase) * r;
        if (i === 1) ctx.moveTo(x, y); else ctx.lineTo(x, y);
      }
      ctx.strokeStyle = 'rgba(217,227,255,0.32)';
      ctx.stroke();
      // Draw sample points along the spiral
      for (let i = 1; i <= iterations; i += Math.max(1, Math.floor(iterations / 420))) {
        const s = sample(i);
        const r = (i / iterations) * maxR;
        const x = cx + Math.cos(s.phase) * r;
        const y = cy + Math.sin(s.phase) * r;
        ctx.beginPath();
        ctx.arc(x, y, Math.max(1.5, 2.5 * devicePixelRatio), 0, TAU);
        ctx.fillStyle = `hsla(${(s.ksig[0] * 22.5 + s.ksig[1] * 4) % 360}, 85%, 66%, ${0.25 + s.coherence * 0.75})`;
        ctx.fill();
      }
      // Highlight probe position
      const p = sample(probe);
      const pr = (probe / iterations) * maxR;
      const px = cx + Math.cos(p.phase) * pr;
      const py = cy + Math.sin(p.phase) * pr;
      ctx.beginPath();
      ctx.arc(px, py, Math.max(7, 9 * devicePixelRatio), 0, TAU);
      ctx.strokeStyle = 'rgba(255,255,255,0.95)';
      ctx.lineWidth = Math.max(2, 2 * devicePixelRatio);
      ctx.stroke();
      fields.phase.textContent = p.phase.toFixed(6);
      fields.energy.textContent = p.energy.toFixed(8);
      fields.coherence.textContent = p.coherence.toFixed(6);
      fields.ksig.textContent = p.ksig.join('.');
      fields.hex.textContent = p.hex.slice(0, 32);
    }
    iterationsInput.addEventListener('input', draw);
    probeInput.addEventListener('input', draw);
    document.getElementById('animate').addEventListener('click', () => {
      animating = !animating;
    });
    function loop() {
      if (animating) {
        const max = Number(iterationsInput.value);
        probeInput.value = (Number(probeInput.value) + 1) % (max + 1);
        draw();
      }
      requestAnimationFrame(loop);
    }
    draw();
    loop();
    // UI toggle logic
    const uiContainer = document.getElementById('uiContainer');
    const toggleBtn = document.getElementById('toggle-ui');
    toggleBtn.addEventListener('click', () => {
      uiContainer.classList.toggle('hidden');
      toggleBtn.textContent = uiContainer.classList.contains('hidden') ? 'Show UI' : 'Hide UI';
    });
  </script>
</body>
</html>
